# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tradehax.net www.tradehax.net;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main vhost ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tradehax.net www.tradehax.net;

    # TLS certificates (issued by Certbot — see README)
    ssl_certificate     /etc/letsencrypt/live/tradehax.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradehax.net/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (enable only after you confirm HTTPS works)
    # add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 10g;
    proxy_read_timeout   3600s;   # allow large uploads

    # ── Proxy to Flask app ───────────────────────────────────────────────
    location / {
        proxy_pass         http://app:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_request_buffering off;
    }
}
